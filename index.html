<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SCRABBLE · Word Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo" id="homeMenuBtn">
                <i class="fas fa-font"></i>
                <span>SCRABBLE</span>
            </div>
            <div class="nav-menu" id="navMenu">
                <button class="nav-link active" data-page="game">
                    <i class="fas fa-gamepad"></i>
                    <span>Game</span>
                </button>
                <button class="nav-link" data-page="support">
                    <i class="fas fa-heart"></i>
                    <span>Support</span>
                </button>
            </div>
            <div class="nav-toggle" id="navToggle">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <div id="gamePage" class="page active">
        <div class="game-container">
            <div class="score-board" id="scoreBoard"></div>

            <div class="game-info">
                <div class="turn-indicator">
                    <i class="fas fa-user"></i>
                    <span id="turnText">Player 1's Turn</span>
                </div>
                <div class="timer-display" id="timerDisplay">
                    <i class="fas fa-hourglass-half"></i>
                    <span id="timerText">03:00</span>
                </div>
                <div class="tiles-left">
                    <i class="fas fa-cube"></i>
                    <span id="tilesLeft">Tiles Left: 100</span>
                </div>
            </div>

            

            <div class="board-container">
                <div class="board" id="board"></div>
            </div>

            <div class="letter-rack" id="letterRack"></div>

            <div class="selected-word">
                <span>Word:</span>
                <span id="selectedWordDisplay">-</span>
                <span id="wordScoreDisplay">(0 pts)</span>
            </div>

            <div class="game-controls">
                <button id="submitWordBtn" class="btn-control btn-primary">
                    <i class="fas fa-check"></i> Submit Word
                </button>
                <button id="clearWordBtn" class="btn-control btn-reset">
                    <i class="fas fa-trash-alt"></i> Clear
                </button>
                <button id="skipTurnBtn" class="btn-control btn-skip">
                    <i class="fas fa-forward"></i> Skip Turn
                </button>
                <button id="finishGameBtn" class="btn-control btn-finish" style="display:none;">
                    <i class="fas fa-flag-checkered"></i> Finish Game
                </button>
            </div>
        </div>
    </div>

    <div id="supportPage" class="page">
        <div class="container support-container">
            <div class="support-header">
                <i class="fas fa-heart"></i>
                <h1>Support</h1>
                <p>follow & share the fun</p>
            </div>
            <div class="social-links">
                <a href="https://instagram.com/_arsu.x" target="_blank" class="social-card">
                    <div class="social-icon"><i class="fab fa-instagram"></i></div>
                    <div class="social-info"><h3>Instagram</h3><span>@_arsu.x</span></div>
                    <i class="fas fa-arrow-right"></i>
                </a>
                <a href="https://tiktok.com/@my.ville" target="_blank" class="social-card">
                    <div class="social-icon"><i class="fab fa-tiktok"></i></div>
                    <div class="social-info"><h3>TikTok</h3><span>@my.ville</span></div>
                    <i class="fas fa-arrow-right"></i>
                </a>
                <a href="https://github.com/Arfadh-Subhan" target="_blank" class="social-card">
                    <div class="social-icon"><i class="fab fa-github"></i></div>
                    <div class="social-info"><h3>GitHub</h3><span>Arfadh-Subhan</span></div>
                    <i class="fas fa-arrow-right"></i>
                </a>
            </div>
            <div class="support-footer">
                <p>❤️ Love this game? Share it with friends!</p>
                <div class="share-buttons">
                    <button class="share-btn" id="shareTwitter"><i class="fab fa-twitter"></i></button>
                    <button class="share-btn" id="shareWhatsapp"><i class="fab fa-whatsapp"></i></button>
                    <button class="share-btn" id="shareTelegram"><i class="fab fa-telegram"></i></button>
                </div>
            </div>
        </div>
    </div>

    <div id="setupModal" class="modal-overlay">
        <div class="modal-card setup-card">
            <div class="modal-header">
                <h3><i class="fas fa-cog"></i> Game Setup</h3>
            </div>
            <div class="modal-body">
                <div class="setup-players" id="setupPlayers"></div>
                <div class="setup-option">
                    <label><i class="fas fa-users"></i> Number of Players</label>
                    <div class="player-count-buttons">
                        <button class="player-count-btn" data-count="2">2 Players</button>
                        <button class="player-count-btn" data-count="3">3 Players</button>
                        <button class="player-count-btn" data-count="4">4 Players</button>
                    </div>
                </div>
                <button id="startGameBtn" class="btn-start-game">
                    <i class="fas fa-play"></i> Start Game
                </button>
            </div>
        </div>
    </div>

    <div id="nameEditorModal" class="modal-overlay">
        <div class="modal-card name-editor-card">
            <div class="modal-header">
                <h3><i class="fas fa-pencil-alt"></i> Edit Player Name</h3>
                <button class="modal-close" id="closeNameEditorBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="name-editor-input">
                    <label id="nameEditorLabel">Player Name</label>
                    <input type="text" id="nameEditorInput" maxlength="20" placeholder="Enter name">
                </div>
                <div class="name-editor-actions">
                    <button id="saveNameBtn" class="btn-save"><i class="fas fa-check"></i> Save</button>
                    <button id="cancelNameBtn" class="btn-cancel"><i class="fas fa-times"></i> Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Blank Tile Letter Selection Modal -->
    <div id="blankTileModal" class="modal-overlay">
        <div class="modal-card blank-card">
            <div class="modal-header">
                <h3><i class="fas fa-font"></i> Choose Letter for Blank Tile</h3>
            </div>
            <div class="modal-body">
                <div class="blank-letter-selector" id="blankLetterSelector"></div>
                <button id="confirmBlankLetterBtn" class="btn-start-game">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Turn Modal -->
    <div id="turnModal" class="modal-overlay turn-modal">
        <div class="turn-card">
            <i class="fas fa-user-circle"></i>
            <h2 id="turnModalText">Player 1's Turn</h2>
            <button id="closeTurnModalBtn" class="btn-turn-ok">OK</button>
        </div>
    </div>

    <!-- Result Modal -->
    <div id="resultModal" class="modal-overlay">
        <div class="result-card">
            <div class="result-header" id="resultHeader">
                <i class="fas fa-trophy"></i>
                <h2 id="resultTitle">GAME OVER!</h2>
            </div>
            <div class="result-body" id="resultBody"></div>
            <div class="result-buttons">
                <button id="playAgainBtn" class="btn-winner">Play Again</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
